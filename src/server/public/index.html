<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>AGI · autopilot orchestrator</title>
    <style>
      :root {
        --bg: #0b0e14;
        --panel: #11161f;
        --panel-2: #161c28;
        --border: #232b3a;
        --text: #d7dce5;
        --muted: #7c8699;
        --accent: #ffc107;
        --green: #3ddc84;
        --blue: #5aa9ff;
        --amber: #ffb454;
        --red: #ff5f6e;
        --gray: #5b6577;
        font-synthesis: none;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        background: var(--bg);
        color: var(--text);
        font: 14px/1.5 ui-sans-serif, system-ui, "Segoe UI", sans-serif;
        height: 100vh;
        display: flex;
        flex-direction: column;
      }
      header {
        display: flex;
        align-items: center;
        gap: 14px;
        padding: 12px 18px;
        border-bottom: 1px solid var(--border);
        background: var(--panel);
      }
      header h1 { font-size: 15px; margin: 0; letter-spacing: 0.5px; }
      header h1 b { color: var(--accent); }
      .provider { margin-left: auto; color: var(--muted); font-size: 12px; display: flex; align-items: center; gap: 8px; }
      .dot { width: 9px; height: 9px; border-radius: 50%; background: var(--gray); display: inline-block; }
      .dot.ok { background: var(--green); }
      .dot.bad { background: var(--red); }
      button {
        font: inherit;
        font-size: 12px;
        color: var(--text);
        background: var(--panel-2);
        border: 1px solid var(--border);
        border-radius: 7px;
        padding: 5px 11px;
        cursor: pointer;
      }
      button:hover { border-color: var(--accent); }
      button.primary { background: var(--accent); color: #1a1300; border-color: var(--accent); font-weight: 600; }
      main { flex: 1; display: grid; grid-template-columns: 320px 1fr; min-height: 0; }
      aside { border-right: 1px solid var(--border); background: var(--panel); overflow-y: auto; }
      .side-head { display: flex; align-items: center; padding: 12px 14px; gap: 8px; }
      .side-head span { color: var(--muted); font-size: 11px; text-transform: uppercase; letter-spacing: 1px; }
      .scard {
        margin: 0 10px 10px; padding: 11px 12px;
        background: var(--panel-2); border: 1px solid var(--border); border-radius: 10px;
        cursor: pointer;
      }
      .scard.sel { border-color: var(--accent); }
      .scard .row1 { display: flex; align-items: center; gap: 8px; }
      .scard .name { font-weight: 600; font-size: 13px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
      .badge {
        margin-left: auto; font-size: 10px; text-transform: uppercase; letter-spacing: 0.5px;
        padding: 2px 7px; border-radius: 20px; border: 1px solid var(--border); color: var(--muted);
      }
      .badge.running { color: var(--green); border-color: var(--green); }
      .badge.done { color: var(--blue); border-color: var(--blue); }
      .badge.stopped { color: var(--amber); border-color: var(--amber); }
      .badge.error { color: var(--red); border-color: var(--red); }
      .badge.rate-limited { color: var(--amber); border-color: var(--amber); }
      .usage { margin-left: auto; color: var(--muted); font-size: 12px; }
      .usage b { color: var(--text); }
      .usage.warn b { color: var(--amber); }
      .usage.over b { color: var(--red); }
      .badge.needs-input {
        color: #1a1300; background: var(--amber); border-color: var(--amber);
        animation: pulse 1.05s ease-in-out infinite;
      }
      .scard.needs .name::before { content: "● "; color: var(--amber); }
      @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.45; } }

      /* attention / human-decision panel */
      .attention {
        margin: 14px 18px; padding: 14px 16px;
        border: 1px solid var(--amber); border-left: 4px solid var(--amber);
        border-radius: 10px; background: rgba(255,180,84,0.08);
      }
      .attention h3 {
        margin: 0 0 6px; font-size: 12px; color: var(--amber);
        text-transform: uppercase; letter-spacing: 1px;
      }
      .attention .q { font-size: 14px; font-weight: 600; margin-bottom: 12px; }
      .attention .opt {
        display: block; width: 100%; text-align: left; margin-bottom: 8px;
        padding: 9px 12px; background: var(--panel-2);
      }
      .attention .opt:hover { border-color: var(--amber); }
      .attention .opt b { display: block; font-size: 13px; }
      .attention .opt small { color: var(--muted); }
      .attention .custom { display: flex; gap: 8px; margin-top: 10px; }
      .attention .custom textarea {
        flex: 1; font: inherit; font-size: 13px; color: var(--text);
        background: var(--panel-2); border: 1px solid var(--border);
        border-radius: 7px; padding: 7px 9px; resize: vertical; min-height: 38px;
      }
      .attention .custom textarea:focus { outline: none; border-color: var(--accent); }
      .scard .meta { color: var(--muted); font-size: 11px; margin-top: 5px; }
      .scard .acts { display: flex; gap: 6px; margin-top: 9px; }
      section.detail { display: flex; flex-direction: column; min-height: 0; overflow: hidden; }
      .dhead { padding: 14px 18px; border-bottom: 1px solid var(--border); }
      .dhead .goal { color: var(--muted); font-size: 12px; margin-top: 4px; }
      .stat { display: inline-flex; gap: 5px; margin-right: 16px; font-size: 12px; color: var(--muted); }
      .stat b { color: var(--text); }
      .brain { padding: 10px 18px; border-bottom: 1px solid var(--border); background: var(--panel); font-size: 12px; }
      .brain .lbl { color: var(--accent); font-weight: 600; margin-right: 8px; }
      .screen-wrap { flex: 1; min-height: 0; overflow: auto; padding: 14px 18px; }
      pre.screen {
        margin: 0; font: 12.5px/1.35 ui-monospace, "Cascadia Code", Consolas, monospace;
        color: #c9d4e3; white-space: pre; tab-size: 2;
      }
      .empty { color: var(--muted); padding: 40px; text-align: center; }
      button.danger:hover { border-color: var(--red); color: var(--red); }

      /* modal */
      .modal-back {
        position: fixed; inset: 0; background: rgba(0,0,0,0.55);
        display: flex; align-items: center; justify-content: center; z-index: 50;
      }
      .modal {
        width: 460px; max-width: calc(100vw - 32px); max-height: calc(100vh - 48px);
        overflow-y: auto;
        background: var(--panel); border: 1px solid var(--border); border-radius: 12px;
        padding: 18px 20px;
      }
      .modal h2 { margin: 0 0 14px; font-size: 15px; }
      .modal label { display: block; font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; margin: 12px 0 4px; }
      .modal input, .modal textarea, .modal select {
        width: 100%; font: inherit; font-size: 13px; color: var(--text);
        background: var(--panel-2); border: 1px solid var(--border); border-radius: 7px;
        padding: 7px 9px;
      }
      .modal textarea { resize: vertical; min-height: 52px; }
      .modal input:focus, .modal textarea:focus, .modal select:focus { outline: none; border-color: var(--accent); }
      .modal .ferr { color: var(--red); font-size: 12px; min-height: 16px; margin-top: 10px; }
      .modal .facts { display: flex; gap: 8px; justify-content: flex-end; margin-top: 14px; }

      /* toast */
      #toast {
        position: fixed; bottom: 18px; left: 50%; transform: translateX(-50%);
        background: var(--panel-2); border: 1px solid var(--red); color: var(--text);
        padding: 9px 14px; border-radius: 8px; font-size: 13px; z-index: 60;
        max-width: 70vw; box-shadow: 0 4px 18px rgba(0,0,0,0.4);
        opacity: 0; pointer-events: none; transition: opacity 0.2s;
      }
      #toast.show { opacity: 1; }

      /* history / metrics */
      .metrics { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 14px; }
      .metric { background: var(--panel-2); border: 1px solid var(--border); border-radius: 8px; padding: 8px 12px; min-width: 70px; }
      .metric .v { font-size: 18px; font-weight: 700; }
      .metric .k { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; }
      .runrow { display: flex; align-items: center; gap: 10px; padding: 8px 10px; border: 1px solid var(--border); border-radius: 8px; margin-bottom: 6px; cursor: pointer; }
      .runrow:hover { border-color: var(--accent); }
      .runrow .rid { color: var(--muted); font-size: 12px; }
      .tl-turn { border-left: 2px solid var(--border); padding: 6px 0 6px 12px; margin: 0 0 10px; }
      .tl-turn .you { color: var(--blue); font-size: 13px; }
      .tl-turn .cl { color: var(--text); font-size: 13px; margin-top: 2px; }
      .tl-turn .dec { color: var(--muted); font-size: 12px; margin-top: 4px; }
      .tl-back { cursor: pointer; color: var(--accent); }
    </style>
  </head>
  <body>
    <header>
      <h1><b>AGI</b> · autopilot orchestrator</h1>
      <button class="primary" id="startAll">▶ Start all</button>
      <button id="popout" title="Always-on-top status window (Chrome/Edge)">⧉ Pop out</button>
      <span class="usage" id="usage"></span>
      <div class="provider">
        <span class="dot" id="provdot"></span><span id="prov">connecting…</span>
      </div>
    </header>
    <main>
      <aside>
        <div class="side-head">
          <span>Sessions</span>
          <button id="newSession" style="margin-left:auto">➕ New session</button>
        </div>
        <div id="list"></div>
      </aside>
      <section class="detail" id="detail">
        <div class="empty">No session selected.</div>
      </section>
    </main>

    <div id="modalRoot"></div>
    <div id="toast"></div>

    <script>
      let focusId = null;
      let last = null;
      let ws;

      function connect() {
        ws = new WebSocket(`ws://${location.host}/ws`);
        ws.onmessage = (ev) => {
          const msg = JSON.parse(ev.data);
          if (msg.type === "error") { toast(msg.message); return; }
          if (msg.type === "snapshot") { render(msg); notifyTransitions(msg); return; }
        };
        ws.onclose = () => setTimeout(connect, 1000);
      }
      function send(o) { if (ws && ws.readyState === 1) ws.send(JSON.stringify(o)); }
      document.getElementById("startAll").onclick = () => send({ type: "startAll" });
      document.getElementById("newSession").onclick = () => openForm(null);

      let toastTimer = null;
      function toast(message) {
        const el = document.getElementById("toast");
        el.textContent = message;
        el.classList.add("show");
        clearTimeout(toastTimer);
        toastTimer = setTimeout(() => el.classList.remove("show"), 4000);
      }

      // Open the add/edit form. Pass null to add, or a session object to edit.
      function openForm(sess) {
        const editing = !!sess;
        const root = document.getElementById("modalRoot");
        root.innerHTML = `
          <div class="modal-back" id="modalBack">
            <div class="modal">
              <h2>${editing ? "Edit session" : "New session"}</h2>
              <label>id / label (optional)</label>
              <input id="f_id" ${editing ? "disabled" : ""} value="${editing ? esc(sess.id) : ""}" placeholder="auto-generated if blank" />
              <label>cwd (project directory)</label>
              <input id="f_cwd" value="${editing ? esc(sess.cwd) : ""}" placeholder="C:\\path\\to\\project" />
              <label>goal</label>
              <textarea id="f_goal" placeholder="what claude should accomplish">${editing ? esc(sess.goal) : ""}</textarea>
              <label>done criteria</label>
              <textarea id="f_done" placeholder="you are done when…">${editing && sess.doneCriteria ? esc(sess.doneCriteria) : ""}</textarea>
              <label>permission mode</label>
              <select id="f_perm">
                <option value="default">default</option>
                <option value="acceptEdits">acceptEdits</option>
                <option value="auto">auto</option>
                <option value="bypassPermissions">bypassPermissions</option>
              </select>
              <div class="ferr" id="f_err"></div>
              <div class="facts">
                <button id="f_cancel">Cancel</button>
                <button class="primary" id="f_save">${editing ? "Save" : "Create"}</button>
              </div>
            </div>
          </div>`;

        const permSel = document.getElementById("f_perm");
        permSel.value = (editing && sess.permissionMode) ? sess.permissionMode : "acceptEdits";

        const close = () => { root.innerHTML = ""; };
        document.getElementById("f_cancel").onclick = close;
        document.getElementById("modalBack").onclick = (e) => {
          if (e.target.id === "modalBack") close();
        };

        document.getElementById("f_save").onclick = () => {
          const cwd = document.getElementById("f_cwd").value.trim();
          const goal = document.getElementById("f_goal").value.trim();
          const doneCriteria = document.getElementById("f_done").value.trim();
          const permissionMode = permSel.value;
          const errEl = document.getElementById("f_err");
          if (!cwd || !goal || !doneCriteria) {
            errEl.textContent = "cwd, goal, and done criteria are all required.";
            return;
          }
          if (editing) {
            send({ type: "update", id: sess.id, patch: { cwd, goal, doneCriteria, permissionMode } });
          } else {
            const id = document.getElementById("f_id").value.trim();
            const session = { cwd, goal, doneCriteria, permissionMode };
            if (id) session.id = id;
            send({ type: "add", session });
          }
          close();
        };
      }

      function esc(s) {
        return (s || "").replace(/[&<>]/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;" }[c]));
      }

      function render(snap) {
        last = snap;
        if (!focusId && snap.sessions[0]) focusId = snap.sessions[0].id;

        const p = snap.provider;
        document.getElementById("prov").textContent = `${p.model}`;
        document.getElementById("provdot").className = "dot " + (p.ok ? "ok" : "bad");

        const b = snap.budget;
        const uEl = document.getElementById("usage");
        if (b) {
          const t = `<b>${b.turns}</b>${b.maxTurns ? "/" + b.maxTurns : ""} turns`;
          const m = `<b>${Math.round(b.minutes)}</b>${b.maxMinutes ? "/" + b.maxMinutes : ""}m`;
          uEl.innerHTML = `today: ${t} · ${m}`;
          const near = (b.maxTurns && b.turns / b.maxTurns >= 0.8) || (b.maxMinutes && b.minutes / b.maxMinutes >= 0.8);
          uEl.className = "usage" + (b.exceeded ? " over" : near ? " warn" : "");
        }

        // sidebar
        const list = document.getElementById("list");
        list.innerHTML = snap.sessions.map((s) => `
          <div class="scard ${s.id === focusId ? "sel" : ""} ${s.status === "needs-input" ? "needs" : ""}" data-id="${esc(s.id)}">
            <div class="row1">
              <span class="name">${esc(s.id)}</span>
              <span class="badge ${s.status}">${s.status}</span>
            </div>
            <div class="meta">turn ${s.turns} · ${s.elapsedMin ? s.elapsedMin.toFixed(1) + "m" : "—"}</div>
            <div class="acts">
              ${s.status === "running"
                ? `<button data-act="stop" data-id="${esc(s.id)}">■ Stop</button>`
                : `<button data-act="start" data-id="${esc(s.id)}">▶ Start</button>
                   <button data-act="edit" data-id="${esc(s.id)}">✎ Edit</button>
                   <button class="danger" data-act="delete" data-id="${esc(s.id)}">🗑 Delete</button>`}
            </div>
          </div>`).join("");

        list.querySelectorAll(".scard").forEach((el) => {
          el.onclick = (e) => {
            if (e.target.dataset.act) return;
            focusId = el.dataset.id;
            send({ type: "focus", id: focusId });
            render(last);
          };
        });
        list.querySelectorAll("button[data-act]").forEach((b) => {
          b.onclick = (e) => {
            e.stopPropagation();
            const id = b.dataset.id;
            const act = b.dataset.act;
            if (act === "edit") {
              const target = snap.sessions.find((x) => x.id === id);
              if (target) openForm(target);
            } else if (act === "delete") {
              if (confirm(`Delete session "${id}"? This removes it from config.json.`)) {
                send({ type: "remove", id });
              }
            } else {
              send({ type: act, id });
            }
          };
        });

        // detail
        const s = snap.sessions.find((x) => x.id === focusId);
        const detail = document.getElementById("detail");
        if (!s) { detail.innerHTML = `<div class="empty">No session selected.</div>`; return; }
        const screen = snap.focus && snap.focus.id === s.id ? snap.focus.screen : "";
        const att = s.status === "needs-input" && s.attention ? s.attention : null;
        detail.innerHTML = `
          <div class="dhead">
            <div class="row1">
              <span class="name" style="font-weight:600">${esc(s.id)}</span>
              <span class="badge ${s.status}" style="margin-left:10px">${s.status}</span>
              <button id="histBtn" style="margin-left:auto">🕘 History</button>
            </div>
            <div class="goal">${esc(s.goal)}</div>
            <div style="margin-top:8px">
              <span class="stat">turns <b>${s.turns}</b></span>
              <span class="stat">elapsed <b>${s.elapsedMin ? s.elapsedMin.toFixed(1) + "m" : "—"}</b></span>
              <span class="stat">cwd <b>${esc(s.cwd)}</b></span>
            </div>
          </div>
          ${att ? attentionHtml(s, att) : ""}
          <div class="brain">
            <span class="lbl">brain</span>${esc(s.lastDecision) || '<span style="color:var(--muted)">—</span>'}
            ${s.error ? `<div style="color:var(--red);margin-top:6px">${esc(s.error)}</div>` : ""}
          </div>
          <div class="screen-wrap">
            ${screen
              ? `<pre class="screen">${esc(screen)}</pre>`
              : `<div class="empty">${s.status === "running" || s.status === "needs-input" ? "waiting for screen…" : "session not running"}</div>`}
          </div>`;

        if (att) wireAttention(s.id, att);
        const hb = document.getElementById("histBtn");
        if (hb) hb.onclick = () => openHistory(s.id);
        updatePip(snap);
      }

      // ---- human-decision (attention) ----------------------------------------
      const drafts = {}; // preserve a half-typed custom prompt across 1s re-renders

      function attentionHtml(s, att) {
        const isGate = att.kind === "gate";
        const opts = (att.options || []).map((o, i) => `
          <button class="opt" data-opt="${i}">
            <b>${esc(o.label)}</b>
            ${o.rationale ? `<small>${esc(o.rationale)}</small>` : ""}
          </button>`).join("");
        const custom = isGate
          ? `<div style="display:flex; justify-content:flex-end"><button class="danger" id="att_stop">Stop run</button></div>`
          : `<div class="custom">
              <textarea id="att_custom" placeholder="…or type your own instruction">${esc(drafts[s.id] || "")}</textarea>
              <div style="display:flex; flex-direction:column; gap:6px">
                <button class="primary" id="att_send">Send</button>
                <button class="danger" id="att_stop">Stop run</button>
              </div>
            </div>`;
        return `
          <div class="attention">
            <h3>${isGate ? "⚠ Risky action — approve?" : "⚠ Needs your decision"}</h3>
            <div class="q">${esc(att.question)}</div>
            ${opts}
            ${custom}
          </div>`;
      }

      function wireAttention(id, att) {
        const ta = document.getElementById("att_custom");
        if (ta) ta.oninput = () => { drafts[id] = ta.value; };
        document.querySelectorAll(".attention .opt").forEach((b) => {
          b.onclick = () => {
            delete drafts[id];
            send({ type: "resolve", id, choice: { optionIndex: Number(b.dataset.opt) } });
          };
        });
        const sendBtn = document.getElementById("att_send");
        if (sendBtn) sendBtn.onclick = () => {
          const v = (ta && ta.value || "").trim();
          if (!v) { toast("type an instruction or pick an option"); return; }
          delete drafts[id];
          send({ type: "resolve", id, choice: { customPrompt: v } });
        };
        const stopBtn = document.getElementById("att_stop");
        if (stopBtn) stopBtn.onclick = () => {
          delete drafts[id];
          send({ type: "resolve", id, choice: { stop: true } });
        };
      }

      // ---- Picture-in-Picture always-on status window ------------------------
      let pipWindow = null;
      const prevStatus = {};
      const PIP_CSS = `
        :root{--bg:#0b0e14;--panel-2:#161c28;--border:#232b3a;--text:#d7dce5;--muted:#7c8699;
          --green:#3ddc84;--blue:#5aa9ff;--amber:#ffb454;--red:#ff5f6e;--gray:#5b6577;}
        *{box-sizing:border-box;} body{margin:0;background:var(--bg);color:var(--text);
          font:13px/1.4 ui-sans-serif,system-ui,"Segoe UI",sans-serif;}
        #pipRoot{padding:8px;}
        .pip-h{font-size:11px;text-transform:uppercase;letter-spacing:1px;color:var(--muted);padding:4px 6px 8px;}
        .pchip{display:flex;align-items:center;gap:8px;padding:8px 10px;margin-bottom:6px;
          background:var(--panel-2);border:1px solid var(--border);border-radius:8px;cursor:pointer;}
        .pchip:hover{border-color:var(--amber);}
        .pdot{width:9px;height:9px;border-radius:50%;background:var(--gray);flex:none;}
        .pdot.running{background:var(--green);} .pdot.done{background:var(--blue);}
        .pdot.stopped{background:var(--amber);} .pdot.error{background:var(--red);}
        .pdot.needs-input{background:var(--amber);} .pdot.rate-limited{background:var(--amber);}
        .pname{font-weight:600;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
        .pstat{font-size:10px;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);}
        .pturn{font-size:10px;color:var(--muted);}
        .pchip.needs-input{background:rgba(255,180,84,.16);border-color:var(--amber);
          animation:pp 1.05s ease-in-out infinite;}
        .pchip.needs-input .pstat{color:var(--amber);font-weight:700;}
        @keyframes pp{0%,100%{opacity:1;}50%{opacity:.5;}}
        .pempty{color:var(--muted);padding:14px;text-align:center;}`;

      const popoutBtn = document.getElementById("popout");
      if (!("documentPictureInPicture" in window)) {
        popoutBtn.disabled = true;
        popoutBtn.title = "Needs Chrome/Edge (Document Picture-in-Picture API)";
      } else {
        popoutBtn.onclick = togglePip;
      }

      async function togglePip() {
        if (pipWindow) { pipWindow.close(); return; }
        try {
          pipWindow = await documentPictureInPicture.requestWindow({ width: 320, height: 440 });
        } catch (e) { toast("could not open pop-out: " + e.message); return; }
        const st = pipWindow.document.createElement("style");
        st.textContent = PIP_CSS;
        pipWindow.document.head.appendChild(st);
        pipWindow.document.body.innerHTML = `<div id="pipRoot"><div class="pip-h">AGI · live</div><div id="pipList"></div></div>`;
        popoutBtn.textContent = "⧉ Pop in";
        // ask for notification permission (this is a user gesture)
        if ("Notification" in window && Notification.permission === "default") Notification.requestPermission();
        pipWindow.addEventListener("pagehide", () => { pipWindow = null; popoutBtn.textContent = "⧉ Pop out"; });
        if (last) updatePip(last);
      }

      function updatePip(snap) {
        if (!pipWindow) return;
        const listEl = pipWindow.document.getElementById("pipList");
        if (!listEl) return;
        listEl.innerHTML = snap.sessions.map((s) => `
          <div class="pchip ${s.status}" data-id="${esc(s.id)}">
            <span class="pdot ${s.status}"></span>
            <span class="pname">${esc(s.id)}</span>
            <span class="pstat">${s.status === "needs-input" ? "needs you" : s.status}</span>
            <span class="pturn">t${s.turns}</span>
          </div>`).join("") || `<div class="pempty">no sessions</div>`;
        listEl.querySelectorAll(".pchip").forEach((el) => {
          el.onclick = () => {
            focusId = el.dataset.id;
            send({ type: "focus", id: focusId });
            render(last);
            window.focus();
          };
        });
      }

      // Desktop notifications on status transitions (so you notice even with PiP closed).
      function notifyTransitions(snap) {
        for (const s of snap.sessions) {
          const prev = prevStatus[s.id];
          if (prev && prev !== s.status) {
            if (s.status === "needs-input") notify(`⚠ ${s.id} needs your decision`, (s.attention && s.attention.question) || "");
            else if (s.status === "done") notify(`✓ ${s.id} finished`, "");
            else if (s.status === "error") notify(`⚠ ${s.id} errored`, s.error || "");
            else if (s.status === "rate-limited") notify(`⏳ ${s.id} rate-limited`, s.error || "");
          }
          prevStatus[s.id] = s.status;
        }
      }
      function notify(title, body) {
        if ("Notification" in window && Notification.permission === "granted") {
          try { new Notification(title, { body }); } catch (e) {}
        }
      }

      // ---- history / metrics (read-only, from SQLite via /api) ---------------
      async function fetchJson(url) { const r = await fetch(url); return r.json(); }

      function runRowHtml(r) {
        const dur = r.elapsed_min != null ? r.elapsed_min.toFixed(1) + "m" : "—";
        const badge = r.status === "ended" ? "done" : r.status;
        return `<div class="runrow" data-run="${r.id}">
          <span class="badge ${badge}">${r.status}</span>
          <span class="rid">#${r.id}</span>
          <span>turns ${r.turns} · ${dur}</span>
          <span style="margin-left:auto;color:var(--muted);font-size:12px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:240px">${esc(r.stop_reason || "")}</span>
        </div>`;
      }

      async function openHistory(id) {
        const [m, runs] = await Promise.all([
          fetchJson("/api/metrics?session=" + encodeURIComponent(id)),
          fetchJson("/api/runs?session=" + encodeURIComponent(id)),
        ]);
        const byStatus = Object.entries(m.byStatus || {}).map(([k, v]) => `${k} ${v}`).join(" · ") || "—";
        const root = document.getElementById("modalRoot");
        root.innerHTML = `<div class="modal-back" id="modalBack"><div class="modal" style="width:560px">
          <h2>History · ${esc(id)}</h2>
          <div class="metrics">
            <div class="metric"><div class="v">${m.runs}</div><div class="k">runs</div></div>
            <div class="metric"><div class="v">${m.turns}</div><div class="k">turns</div></div>
            <div class="metric"><div class="v">${m.avgTurns}</div><div class="k">avg turns/run</div></div>
            <div class="metric"><div class="v">${Math.round((m.interventionRate || 0) * 100)}%</div><div class="k">needed you</div></div>
          </div>
          <div style="font-size:12px;color:var(--muted);margin-bottom:10px">by status: ${esc(byStatus)}</div>
          <div id="runsList">${runs.length ? runs.map(runRowHtml).join("") : '<div class="empty">no runs yet</div>'}</div>
          <div class="facts"><button id="histClose">Close</button></div>
        </div></div>`;
        document.getElementById("histClose").onclick = () => (root.innerHTML = "");
        document.getElementById("modalBack").onclick = (e) => { if (e.target.id === "modalBack") root.innerHTML = ""; };
        root.querySelectorAll(".runrow").forEach((el) => { el.onclick = () => openRun(Number(el.dataset.run), id); });
      }

      async function openRun(runId, sessionId) {
        const data = await fetchJson("/api/run?id=" + runId);
        const decByN = {};
        (data.decisions || []).forEach((d) => (decByN[d.n] = d));
        const turns = (data.turns || []).map((t) => {
          const d = decByN[t.n];
          const decLine = d
            ? d.action === "continue" ? `→ next: ${esc((d.prompt || "").slice(0, 120))}`
            : d.action === "escalate" ? `⚑ escalated: ${esc(d.reason || "")}`
            : `■ stop: ${esc(d.reason || "")}`
            : "";
          return `<div class="tl-turn">
            <div class="you">→ ${esc((t.injected_prompt || "").slice(0, 160))}</div>
            <div class="cl">claude: ${esc((t.assistant_text || "").replace(/\s+/g, " ").slice(0, 220))}</div>
            ${decLine ? `<div class="dec">${decLine}</div>` : ""}
          </div>`;
        }).join("");
        const evs = (data.events || []).map((e) => e.type).join(" → ");
        const root = document.getElementById("modalRoot");
        root.innerHTML = `<div class="modal-back" id="modalBack"><div class="modal" style="width:600px">
          <h2><span class="tl-back" id="tlBack">← runs</span> · run #${runId}</h2>
          <div style="font-size:11px;color:var(--muted);margin-bottom:12px">${esc(evs)}</div>
          ${turns || '<div class="empty">no turns recorded</div>'}
          <div class="facts"><button id="histClose">Close</button></div>
        </div></div>`;
        document.getElementById("histClose").onclick = () => (root.innerHTML = "");
        document.getElementById("tlBack").onclick = () => openHistory(sessionId);
        document.getElementById("modalBack").onclick = (e) => { if (e.target.id === "modalBack") root.innerHTML = ""; };
      }

      connect();
    </script>
  </body>
</html>
