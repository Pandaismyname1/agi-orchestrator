name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: typecheck · test · build
    # This is a Windows-first project: it drives the real claude.exe through a
    # ConPTY, ships launch.cmd, and parts of the test suite use Windows paths.
    # Running CI on Windows matches the supported platform and what's tested.
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install server dependencies
        run: npm ci

      - name: Install web dependencies
        run: npm --prefix web ci

      # Some tests spin up throwaway git repos and commit to them; a fresh CI
      # runner may have no git identity, so `git commit` would fail. Configure one.
      - name: Configure git identity (tests create temp repos)
        run: |
          git config --global user.email "ci@agi.local"
          git config --global user.name "AGI CI"
          git config --global init.defaultBranch main

      - name: Type-check server
        run: npm run typecheck

      - name: Type-check web
        run: npm run web:check

      # The `test` target is deterministic and offline — no claude CLI or local
      # LLM required. Live smokes (pty-smoke, smoke, brain-validate) are not run
      # in CI because they need a real subscription login + a local model.
      - name: Run unit tests
        run: npm test

      - name: Build dashboard UI
        run: npm run build
