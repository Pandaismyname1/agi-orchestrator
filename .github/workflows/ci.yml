name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: typecheck · test · build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm

      # node-pty is a native module; ubuntu-latest ships the build toolchain,
      # but be explicit so a runner image change doesn't break the build.
      - name: Install build tooling for node-pty
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends build-essential python3

      - name: Install server dependencies
        run: npm ci

      - name: Install web dependencies
        run: npm --prefix web ci

      - name: Type-check server
        run: npm run typecheck

      - name: Type-check web
        run: npm run web:check

      # The `test` target is deterministic and offline — no claude CLI or local
      # LLM required. Live smokes (pty-smoke, smoke, brain-validate) are not run
      # in CI because they need a real subscription login + a local model.
      - name: Run unit tests
        run: npm test

      - name: Build dashboard UI
        run: npm run build
