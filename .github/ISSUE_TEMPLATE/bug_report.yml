name: Bug report
description: Report something that isn't working as expected
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for filing a bug! Please fill in as much as you can.

        ⚠️ **Do not report security issues here** — the billing guard, the dispatch
        remote-access surface, or anything credential-related. See
        [SECURITY.md](https://github.com/Pandaismyname1/agi-orchestrator/blob/main/SECURITY.md).
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug and what you expected instead.
      placeholder: "When I start a session with permissionMode 'default', ..."
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Set config.json to ...
        2. Run `npm start`
        3. Click ...
        4. See error
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs / screenshots
      description: |
        Console output, the `logs/agi.log` tail, or a screenshot. **Redact any dispatch
        token, file paths you don't want public, and goal/prompt text you consider private.**
      render: shell
  - type: dropdown
    id: engine
    attributes:
      label: Which session engine?
      options:
        - claude (default, PTY)
        - claude-headless
        - opencode
        - not engine-specific / not sure
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: OS + version
      placeholder: "Windows 11 26200 / macOS 14.5 / Ubuntu 24.04"
    validations:
      required: true
  - type: input
    id: node
    attributes:
      label: Node.js version (`node -v`)
      placeholder: "v22.11.0"
    validations:
      required: true
  - type: input
    id: model
    attributes:
      label: Local brain model + server
      placeholder: "qwen3.5:9b on Ollama / LM Studio"
  - type: input
    id: claude-version
    attributes:
      label: claude CLI version (`claude --version`)
      placeholder: "1.x.x"
  - type: checkboxes
    id: checks
    attributes:
      label: Pre-flight
      options:
        - label: I'm on the latest `main` (or the newest release).
          required: true
        - label: I searched existing issues and this isn't a duplicate.
          required: true
        - label: The `claude` CLI works on its own (`claude` starts and is logged in).
          required: true
